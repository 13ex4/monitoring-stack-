groups:
  - name: server-alerts

    rules:

      # =========================================
      # HIGH CPU
      # =========================================
      - alert: HighCPUUsage

        expr: 100 - (
          avg by(instance)(
            irate(node_cpu_seconds_total{mode="idle"}[5m])
          ) * 100
        ) > 80

        for: 1m

        labels:
          severity: critical

        annotations:
          summary: "High CPU Usage"



      # =========================================
      # HIGH MEMORY
      # =========================================
      - alert: HighMemoryUsage

        expr: (
          1 - (
            node_memory_MemAvailable_bytes
            /
            node_memory_MemTotal_bytes
          )
        ) * 100 > 80

        for: 1m

        labels:
          severity: critical

        annotations:
          summary: "High Memory Usage"
